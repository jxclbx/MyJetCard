{% load static %}
<!doctype html>
<html lang="zh-CN">

<head>
  <meta charset="utf-8" />
  <title>Edit Gear - MyJetCard</title>
  <link rel="icon" type="image/x-icon" href="{% static 'favicon.ico' %}">
  <link rel="stylesheet" href="{% static 'base.css' %}">
  <style>
    .wrap {
      max-width: 640px;
    }

    h2 {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.01em;
      margin: 0 0 16px;
    }

    label {
      display: block;
      margin-top: 14px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #666;
      margin-bottom: 4px;
    }

    .card {
      background: #fff;
      border: 1px solid #eee;
      border-radius: 10px;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.04);
      padding: 20px;
      text-align: left;
    }

    label {
      display: block;
      margin-top: 12px;
      font-weight: 700;
    }

    input,
    textarea,
    select {
      width: 100%;
      max-width: 520px;
      padding: 8px;
    }

    .actions-bottom {
      margin-top: 18px;
      padding-top: 12px;
      border-top: 1px solid #eee;
      display: flex;
      gap: 10px;
      align-items: center;
      justify-content: flex-start;
    }

    .btn {
      display: inline-block;
      padding: 8px 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      background: #fff;
      cursor: pointer;
      font-size: 13px;
    }

    a {
      color: #0054a6;
      text-decoration: none;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="card">
      <h2>Edit Gear: ID {{ gear.id }}</h2>

      <form method="post">
        {% csrf_token %}
        {{ form.non_field_errors }}

        <label>Kind</label>{{ form.kind }}
        <label>Name</label>{{ form.name }}

        <div class="actions-bottom">
          <button class="btn" type="submit">Save</button>
          <a class="btn" href="{% url 'photos_manage_site' %}">Cancel</a>
        </div>
      </form>
    </div>
  </div>
  <div style="text-align:center;padding:24px 0 12px;font-size:10px;color:#282828;">
    <a href="https://beian.miit.gov.cn/" target="_blank" style="color:#282828;text-decoration:none;">a114514</a>
    <span style="margin:0 4px;">·</span>
    <a href="https://beian.mps.gov.cn/#/query/webSearch?code=61011302001964" rel="noreferrer" target="_blank"
      style="color:#282828;text-decoration:none;">陕公网安备6101130200****号</a>
  </div>
</body>

</html>
